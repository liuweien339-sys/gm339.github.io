<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>搜索页面内容示例</title>
    <style>
        .search-box { margin: 20px 0; }
        .result-item { 
            border: 1px solid #ddd; 
            padding: 10px; 
            margin: 10px 0; 
            background: #f9f9f9;
        }
        .highlight { background-color: yellow; }
    </style>
</head>
<body>

<!-- 搜索区域 -->
<div class="search-box">
    <input type="text" id="keyword" placeholder="输入要搜索的文字...">
    <button onclick="searchParagraphs()">搜索</button>
    <button onclick="clearResults()">清除结果</button>
</div>

<!-- 搜索结果将显示在这里 -->
<div id="searchResults"></div>

<!-- 要被搜索的段落内容 -->
<h3>文章列表</h3>
<div id="content">
    <p>HelloWorld</p>
</div>

<script>
// 获取所有需要搜索的 <p> 元素
function getAllParagraphs() {
    return document.querySelectorAll('#content p');
}

// 搜索功能
function searchParagraphs() {
    const keyword = document.getElementById('keyword').value.trim();
    if (keyword === '') {
        alert('请输入搜索关键词');
        return;
    }

    const paragraphs = getAllParagraphs();
    const results = [];
    
    // 遍历所有段落，查找包含关键词的
    paragraphs.forEach((p, index) => {
        const text = p.innerText;
        if (text.toLowerCase().includes(keyword.toLowerCase())) {
            // 高亮显示匹配的关键词
            const highlightedText = text.replace(
                new RegExp(`(${keyword})`, 'gi'), 
                '<span class="highlight">$1</span>'
            );
            results.push({
                originalIndex: index,
                highlightedHtml: highlightedText,
                fullText: text
            });
        }
    });
    
    // 展示搜索结果
    displayResults(results, keyword);
}

// 展示结果
function displayResults(results, keyword) {
    const resultsDiv = document.getElementById('searchResults');
    
    if (results.length === 0) {
        resultsDiv.innerHTML = `<p>没有找到包含 "${keyword}" 的段落。</p>`;
        return;
    }
    
    let html = `<h3>找到 ${results.length} 个包含 "${keyword}" 的段落：</h3>`;
    results.forEach((result, idx) => {
        html += `
            <div class="result-item">
                <strong>结果 ${idx + 1}:</strong><br>
                ${result.highlightedHtml}
            </div>
        `;
    });
    resultsDiv.innerHTML = html;
}

// 清除搜索结果，恢复原始内容显示
function clearResults() {
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('keyword').value = '';
}
</script>

</body>
</html>
